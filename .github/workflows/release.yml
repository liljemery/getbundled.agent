name: Release agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.2.1)"
        required: true
        default: "2.2.1"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME#v}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "artifact=getbundled-agent-${TAG}-linux-amd64" >> "$GITHUB_OUTPUT"

      - name: Build linux-amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o "${{ steps.ver.outputs.artifact }}" ./cmd/getbundled-agent

      - name: SHA256
        id: sha
        run: echo "sha=$(sha256sum '${{ steps.ver.outputs.artifact }}' | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.tag }}
          files: ${{ steps.ver.outputs.artifact }}
          generate_release_notes: true
          body: |
            SHA256: `${{ steps.sha.outputs.sha }}`
